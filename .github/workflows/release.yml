name: Release

permissions: {}

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

          pushd thirdparty/typescript-go
          git fetch --unshallow
          git am --3way --no-gpg-sign ../../patches/*.patch
          popd

      - run: go build -o ./bin/golar ./thirdparty/typescript-go/cmd/tsgo
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - run: go build -o ./bin/golar-astro ./packages/astro
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: golar-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # for `pnpm publish --provenance`
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true # required for build-typescript-lite
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.13.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: golar-*
          path: build

      - run: node ./tools/gen-npm-packages.ts copy-binaries


      - run: pnpm --version && node --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm build-typescript-lite

      - run: pnpm build

      - run: pnpm publish --provenance --recursive --no-git-checks
