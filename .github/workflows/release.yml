name: Release

permissions: {}

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
            goarch: amd64
          - runs_on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runs_on: windows-latest
            goos: windows
            goarch: amd64
          #    # runtime/cgo
          #      gcc_arm64.S: Assembler messages:
          #      gcc_arm64.S:30: Error: no such instruction: `stp x29,x30,[sp,'
          #      gcc_arm64.S:34: Error: operand size mismatch for `mov'
          #      gcc_arm64.S:36: Error: no such instruction: `stp x19,x20,[sp,'
          #      gcc_arm64.S:39: Error: no such instruction: `stp x21,x22,[sp,'
          # - runs_on: windows-11-arm
          #   goos: windows
          #   goarch: arm64
          - runs_on: macos-15-intel
            goos: darwin
            goarch: amd64
          - runs_on: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      # for thirdparty/typescript
      - run: git config --global core.longpaths true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.13.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - run: pnpm install --frozen-lockfile

      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

          node ./tools/patch-astro.ts
          node ./tools/patch-tsgo.ts

      - if: runner.os == 'Windows'
        run: node ./tools/download-node-lib.ts

      - run: pnpm build:golar put-to-bin

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: golar-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # for `pnpm publish --provenance`
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true # required for build-typescript-lite
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.13.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: golar-*
          path: build

      - run: pnpm install --frozen-lockfile

      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

          node ./tools/patch-astro.ts
          node ./tools/patch-tsgo.ts

      - run: node ./tools/gen-npm-packages.ts copy-binaries

      - run: pnpm build:typescript-lite

      - run: pnpm build:packages

      - run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - run: pnpm publish --provenance --recursive --no-git-checks
