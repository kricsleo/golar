name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        runs_on: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['22.12.0', '24.13.1']
    env:
      # Native TS execution requires --experimental-strip-types on Node < 23
      NODE_OPTIONS: ${{ startsWith(matrix.node-version, '22') && '--experimental-strip-types' || '' }}
    steps:
      # for thirdparty/typescript
      - run: git config --global core.longpaths true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - run: pnpm install --frozen-lockfile

      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

          node ./tools/patch-astro.ts
          node ./tools/patch-tsgo.ts

      - if: runner.os == 'Windows'
        run: node ./tools/download-node-lib.ts

      - run: pnpm build:typescript-lite

      - run: pnpm build:packages

      - run: pnpm build:golar

      - run: cargo build

      - run: pnpm vitest --testTimeout 10000

  test-linux-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-image: ['node:22.12.0-alpine', 'node:24-alpine']
    container:
      image: ${{ matrix.node-image }}
    env:
      NODE_OPTIONS: ${{ startsWith(matrix.node-image, 'node:22') && '--experimental-strip-types' || '' }}
    defaults:
      run:
        shell: sh
    steps:
      - run: apk add bash build-base ca-certificates git linux-headers rust cargo

      # for thirdparty/typescript
      - run: git config --global core.longpaths true

      # https://github.com/actions/runner-images/issues/6775
      - run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"

          node ./tools/patch-astro.ts
          node ./tools/patch-tsgo.ts

      - run: pnpm build:typescript-lite

      - run: pnpm build:packages

      - run: |
          node ./tools/patch-go.ts

          cd thirdparty/go/src
          ./make.bash
          cd -

      - env:
          GOLAR_LIBC: musl
          GOTOOLCHAIN: local
        run: PATH="$(pwd)/thirdparty/go/bin:$PATH" pnpm build:golar

      - run: cargo build

      - run: LD_PRELOAD="$(pwd)/generated-packages/@golar-linux-x64-musl/golar.node" node ./node_modules/vitest/vitest.mjs --testTimeout 10000
